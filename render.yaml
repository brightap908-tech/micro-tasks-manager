services:
  - type: web
    name: microtask-manager
    runtime: python
    buildCommand: |
      set -e
      pip install -r requirements.txt
      cd frontend
      npm install
      npm run build
      cd ..
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
