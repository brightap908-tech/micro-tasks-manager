databases:
  - name: microtask-db
    plan: free
    databaseName: microtask_manager
    user: microtask

services:
  - type: web
    name: microtask-manager

    # Docker runtime — required for Playwright/Chromium.
    #
    # Render's native Python runtime runs as a non-root user, so
    # `playwright install --with-deps` cannot call apt-get to install the
    # system libraries Chromium needs.  Docker runs as root during build,
    # which lets --with-deps install every OS dependency automatically.
    runtime: docker

    # Render auto-detects ./Dockerfile.  All build steps live there:
    #   1. Node 20  →  build React frontend (stage 1)
    #   2. Python 3.11  →  pip install, playwright install --with-deps chromium
    #   3. Copy built frontend into the Python image (stage 2)
    #   4. CMD: uvicorn on $PORT

    # Render probes this path after deploy to confirm the service is healthy.
    healthCheckPath: /api/health

    envVars:
      # PLAYWRIGHT_BROWSERS_PATH must match the path used in the Dockerfile RUN step.
      # This ensures the runtime process finds Chromium at the same location it
      # was installed to during the Docker build.
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright

      - key: DATABASE_URL
        fromDatabase:
          name: microtask-db
          property: connectionString

      # Fernet key for auth_store (encrypted session-cookie storage).
      # Generate:  python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # Paste into Render → Environment tab.  Never commit this value.
      - key: ENCRYPTION_KEY
        sync: false

      # Used by auth_store to derive the Fernet key for .auth_cookies.enc.
      # Set any long random string in Render → Environment tab.
      - key: SESSION_SECRET
        sync: false
